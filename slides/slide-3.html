<!DOCTYPE html><html lang="zh-Hant"><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_base.css">
<style>
  .reg{display:grid;grid-template-columns:1.15fr .85fr;gap:36px;margin-top:30px;align-items:stretch}
  .info{display:flex;flex-direction:column;gap:20px}
  .batch{display:flex;gap:12px;flex-wrap:wrap}
  .pill{font-family:var(--mono);font-size:14px;letter-spacing:.04em;background:#fff;border:1px solid var(--line);border-radius:999px;padding:11px 18px;color:var(--ink);font-weight:500;box-shadow:0 8px 22px -16px rgba(76,46,170,.5)}
  .pill b{color:var(--primary);font-weight:700}
  .price-card{background:var(--surface);border:1px solid var(--line);border-radius:22px;padding:34px 36px;box-shadow:var(--shadow)}
  .price-card .tag{font-family:var(--mono);font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--amber);font-weight:500}
  .orig{font-family:var(--mono);font-size:22px;color:var(--muted);text-decoration:line-through;margin-top:14px}
  .now{display:flex;align-items:baseline;gap:12px;margin-top:6px}
  .now .cur{font-family:var(--mono);font-size:24px;color:var(--ink);font-weight:500}
  .now .amt{font-family:var(--sans);font-weight:900;font-size:74px;line-height:1;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent;letter-spacing:-1px}
  .off{display:inline-block;margin-top:16px;background:var(--amber);color:#fff;font-family:var(--sans);font-weight:800;font-size:15px;padding:7px 16px;border-radius:999px}
  .qr-card{display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--surface);border:1px solid var(--line);border-radius:22px;box-shadow:var(--shadow);padding:30px}
  .qr-box{width:230px;height:230px;border:2.5px dashed #c9bdf0;border-radius:18px;display:flex;align-items:center;justify-content:center;text-align:center;color:var(--muted);font-family:var(--mono);font-size:13px;letter-spacing:.08em;line-height:1.7;background:repeating-linear-gradient(45deg,#faf8ff,#faf8ff 12px,#f3eefc 12px,#f3eefc 24px)}
  .qr-card .cap{margin-top:18px;font-family:var(--sans);font-weight:800;color:var(--ink);font-size:18px}
  .qr-card .sub{margin-top:4px;font-size:13px;color:var(--muted);font-family:var(--mono);letter-spacing:.06em}
</style>
</head><body><div class="slide">
  <div class="kicker">第一梯次 · 限額 8 位</div>
  <h1>現場報名 · <em>早鳥優惠</em></h1>

  <div class="reg">
    <div class="info">
      <div class="batch">
        <span class="pill">📅 <b>6/14（週日）</b>整天</span>
        <span class="pill">⏱ 7 小時</span>
        <span class="pill">👥 只收 <b>8 位</b></span>
      </div>
      <div class="price-card">
        <div class="tag">現場報名限定 · ON-SITE ONLY</div>
        <div class="orig">原價 NT$ 6,800</div>
        <div class="now"><span class="cur">NT$</span><span class="amt">4,080</span></div>
        <span class="off">現場優惠 6 折 · 省 NT$2,720</span>
      </div>
    </div>
    <div class="qr-card">
      <div class="qr-box">QR CODE<br>報名連結<br>（待補上）</div>
      <div class="cap">掃碼立即報名</div>
      <div class="sub">名額有限 · 額滿為止</div>
    </div>
  </div>

  <div class="brand">RAI <b>×</b> CLAUDE CODE CLASS</div>
  <div class="pagenum">03 / 03</div>
</div></body></html>
